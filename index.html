<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>하진이 성장 앨범</title>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .photo-grid { display: grid; gap: 8px; width: 100%; aspect-ratio: 16/9; }
        .saveable-image {
            -webkit-touch-callout: default !important;
            display: block;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans mb-24">

    <header class="bg-white/80 backdrop-blur-md p-6 shadow-sm sticky top-0 z-30 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <button id="back-btn" class="hidden text-2xl p-2 hover:bg-gray-100 rounded-full transition-all">←</button>
            <div>
                <h1 id="header-title" class="text-xl font-bold text-gray-800">하진이 성장 앨범</h1>
                <p id="d-day-display" class="text-xs text-pink-500 font-bold bg-pink-50 px-2 py-0.5 rounded-full inline-block mt-1">
                    태어난 지 +0일
                </p>
            </div>
        </div>
        <div class="w-12 h-12 bg-pink-100 rounded-full flex items-center justify-center text-2xl border-2 border-white shadow-sm">👶</div>
    </header>

    <main id="main-container" class="max-w-md mx-auto p-4 relative">
        <div id="timeline-line" class="absolute left-8 top-0 bottom-0 w-0.5 bg-gray-200 z-0"></div>

        <div id="timeline-list" class="space-y-10 relative z-10">
            <div class="text-center py-20 text-gray-400">사진 데이터를 불러오는 중...</div>
        </div>
    </main>

    <input type="file" id="file-input" accept="image/*, video/*" class="hidden" multiple>

    <button id="fab" class="fixed bottom-8 right-8 w-16 h-16 bg-pink-500 text-white rounded-full shadow-2xl text-4xl flex items-center justify-center active:scale-90 hover:bg-pink-600 transition-all z-40">
        +
    </button>

    <script>

<!--        window.onload = () => {-->
<!--            const password = prompt("비밀번호를 입력하세요:");-->
<!--            if (password === "123123") { // 원하는 비밀번호로 수정-->
<!--                updateDDay();-->
<!--                loadPhotosFromServer();-->
<!--            } else {-->
<!--                alert("비밀번호가 틀렸습니다.");-->
<!--                document.body.innerHTML = "<h1>접근 권한이 없습니다.</h1>";-->
<!--            }-->
<!--        };-->

        // 하진이 생일 설정
        const BIRTH_DATE = new Date("2026-01-16");

        function updateDDay() {
            const today = new Date();
            // 시간 정보를 제거하고 날짜 차이만 계산 (오늘 - 생일)
            const diffTime = today.getTime() - BIRTH_DATE.getTime();
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1; // 태어난 날을 1일로 계산

            const dDayDisplay = document.getElementById('d-day-display');
            dDayDisplay.innerText = `태어난 지 +${diffDays}일`;
        }

        // 기존 window.onload에 추가
        window.addEventListener('load', () => {
            updateDDay();
            checkServerConnection();
        });


        const API_BASE = "https://adelynn-subacrodrome-instructedly.ngrok-free.dev";
        let photoData = {}; // { "2026-03-31": [{src, name, time}, ...] }

        const fileInput = document.getElementById('file-input');
        const fab = document.getElementById('fab');
        const timelineList = document.getElementById('timeline-list');
        const backBtn = document.getElementById('back-btn');
        const headerTitle = document.getElementById('header-title');

        async function checkServerConnection() {
            console.log("서버 연결 확인 시작...");
            const timelineList = document.getElementById('timeline-list');

            try {
                // ngrok-skip 헤더를 넣어서 요청
                const response = await fetch(`${API_BASE}/photos`, {
                    method: 'GET',
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });

                // 1. 응답이 왔더라도 JSON이 아니면 ngrok 경고 페이지임
                const contentType = response.headers.get("content-type");
                if (response.ok && contentType && contentType.includes("application/json")) {
                    console.log("연결 성공: 데이터를 불러옵니다.");
                    loadPhotosFromServer();
                } else {
                    console.log("연결 실패: ngrok 경고 페이지 감지.");
                    renderConnectionGuide();
                }
            } catch (error) {
                // 2. CORS 에러가 나면 바로 여기로 튕겨져 나옵니다.
                console.log("CORS 에러 또는 네트워크 에러 발생 -> 팝업 실행");
                renderConnectionGuide();
            }
        }

        function renderConnectionGuide() {
            const timelineList = document.getElementById('timeline-list');
            // 타임라인 선 숨기기
            const line = document.getElementById('timeline-line');
            if(line) line.style.display = 'none';

            timelineList.innerHTML = `
                <div class="flex flex-col items-center justify-center py-10 px-4 animate-fade-in">
                    <div class="bg-white p-8 rounded-[32px] shadow-xl border border-pink-100 text-center max-w-sm w-full">
                        <div class="text-5xl mb-6">🔒</div>
                        <h2 class="text-xl font-bold text-gray-800 mb-3">연결 승인이 필요해요</h2>
                        <p class="text-sm text-gray-500 mb-8 leading-relaxed">
                            하진이의 사진을 안전하게 가져오기 위해<br>
                            보안 승인이 한 번 필요합니다.
                        </p>

                        <button onclick="openNgrok()" class="w-full bg-pink-500 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all mb-3 text-lg">
                            1. 서버 승인하기
                        </button>

                        <button onclick="location.reload()" class="w-full bg-gray-100 text-gray-600 font-bold py-4 rounded-2xl active:scale-95 transition-all text-sm">
                            2. 승인 완료 후 새로고침
                        </button>

                        <p class="text-[11px] text-gray-400 mt-6 leading-tight">
                            * 새 창에서 <span class="text-blue-500 font-bold underline">Visit Site</span> 버튼을 누른 뒤<br>이 화면으로 돌아와 새로고침 해주세요.
                        </p>
                    </div>
                </div>
            `;
        }

        function openNgrok() {
            // ngrok 주소를 새 창으로 엽니다.
            window.open(API_BASE, '_blank');
        }

        // 1. 페이지 로드 시 서버에서 데이터 가져오기
        async function loadPhotosFromServer() {
            try {
                const response = await fetch(`${API_BASE}/photos`, {
                    method: 'GET',
                    headers: {
                        // 이 헤더가 있으면 ngrok 경고 페이지를 건너뜁니다.
                        'ngrok-skip-browser-warning': '69420'
                    }
                });
                const filenames = await response.json();

                photoData = {}; // 초기화

                filenames.sort().reverse().forEach(name => {
                    // 파일명 규칙: YYYYMMDD_HHMMSS_name.jpg 로 가정
                    const dateStr = `${name.substring(0, 4)}-${name.substring(4, 6)}-${name.substring(6, 8)}`;
                    const timeStr = `${name.substring(9, 11)}:${name.substring(11, 13)}`;

                    if (!photoData[dateStr]) photoData[dateStr] = [];
                    photoData[dateStr].push({
                        src: `${API_BASE}/data/${name}`,
                        name: name,
                        time: timeStr
                    });
                });

                renderTimeline();
            } catch (err) {
                timelineList.innerHTML = `<div class="text-center py-20 text-red-400">파이썬 서버를 확인해주세요.<br><span class="text-xs text-gray-400">app.py 실행 필요</span></div>`;
            }
        }

        // 2. 사진 업로드 처리
        fab.onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            headerTitle.innerText = "날짜 분석 중...";

            for (const file of files) {
                // 1. 사진의 EXIF 날짜 추출하기
                const photoDate = await getPhotoDate(file);

                const formData = new FormData();
                formData.append('photo', file);
                formData.append('memo', '성장 기록');
                formData.append('taken_date', photoDate); // 추출한 날짜를 서버로 전송

                try {
                    await fetch(`${API_BASE}/upload`, {
                        method: 'POST',
                        headers: {
                            'ngrok-skip-browser-warning': '69420'
                        },
                        body: formData
                    });
                } catch (err) {
                    console.error("업로드 실패:", err);
                }
            }

            fileInput.value = "";
            await loadPhotosFromServer();
            headerTitle.innerText = "하진이 성장 앨범";
        };

        // 사진에서 날짜를 추출하는 함수
        function getPhotoDate(file) {
            return new Promise((resolve) => {
                EXIF.getData(file, function() {
                    const dateStr = EXIF.getTag(this, "DateTimeOriginal");
                    if (dateStr) {
                        // EXIF 날짜 형식 "2023:05:20 14:30:00" -> "20230520_143000" 변환
                        const formatted = dateStr.replace(/:/g, "").replace(" ", "_");
                        resolve(formatted);
                    } else {
                        // 날짜 정보가 없으면 파일의 마지막 수정일 사용
                        const lastMod = new Date(file.lastModified);
                        const year = lastMod.getFullYear();
                        const month = String(lastMod.getMonth() + 1).padStart(2, '0');
                        const day = String(lastMod.getDate()).padStart(2, '0');
                        const time = lastMod.toTimeString().split(' ')[0].replace(/:/g, "");
                        resolve(`${year}${month}${day}_${time}`);
                    }
                });
            });
        }

        // 3. 메인 타임라인 렌더링 (요약보기)
        function renderTimeline() {
            timelineList.innerHTML = '';
            document.getElementById('timeline-line').classList.remove('hidden');
            backBtn.classList.add('hidden');
            headerTitle.innerText = "하진이 성장 앨범";

            const sortedDates = Object.keys(photoData).sort().reverse();

            if (sortedDates.length === 0) {
                timelineList.innerHTML = `<div class="text-center py-20 text-gray-400">+ 버튼을 눌러 첫 기록을 남기세요.</div>`;
                return;
            }

            sortedDates.forEach(date => {
                const photos = photoData[date];
                const section = document.createElement('section');
                section.className = "flex space-x-4 cursor-pointer group animate-fade-in";
                section.onclick = () => renderDetail(date);

                // [추가] 미디어 타입(사진/영상)에 따라 태그를 생성하는 헬퍼 함수
                const getMediaTag = (photo, isSmall = false) => {
                    const isVideo = photo.src.toLowerCase().endsWith('.mp4') || photo.src.toLowerCase().endsWith('.mov');
                    if (isVideo) {
                        // 비디오일 경우: ▶️ 아이콘 레이어와 비디오 태그 반환
                        return `
                            <div class="relative w-full h-full">
                                <video src="${photo.src}" class="w-full h-full object-cover"></video>
                                <div class="absolute inset-0 bg-black/20 flex items-center justify-center text-white ${isSmall ? 'text-sm' : 'text-2xl'}">▶️</div>
                            </div>`;
                    } else {
                        // 이미지일 경우: 기존과 동일
                        return `<img src="${photo.src}" class="w-full h-full object-cover">`;
                    }
                };

                // 사진/영상 요약 레이아웃
                let photoMarkup = '';
                if (photos.length === 1) {
                    photoMarkup = `<div class="w-full aspect-video rounded-2xl overflow-hidden shadow-sm border border-gray-100 bg-gray-100">
                        ${getMediaTag(photos[0])}
                    </div>`;
                } else {
                    photoMarkup = `
                        <div class="grid grid-cols-2 gap-2 w-full aspect-video">
                            <div class="rounded-2xl overflow-hidden border border-gray-100 shadow-sm bg-gray-100">
                                ${getMediaTag(photos[0])}
                            </div>
                            <div class="grid grid-rows-2 gap-2">
                                <div class="rounded-xl overflow-hidden border border-gray-100 bg-gray-100">
                                    ${getMediaTag(photos[1], true)}
                                </div>
                                <div class="rounded-xl overflow-hidden relative border border-gray-100 bg-gray-50">
                                    ${photos[2] ? getMediaTag(photos[2], true) : ''}
                                    ${photos.length > 2 ? `<div class="absolute inset-0 bg-black/40 flex items-center justify-center text-white font-bold">+${photos.length - 2}</div>` : ''}
                                </div>
                            </div>
                        </div>`;
                }

                section.innerHTML = `
                    <div class="w-8 h-8 bg-pink-400 rounded-full border-4 border-white shadow-sm flex-shrink-0 mt-1"></div>
                    <div class="flex-1 bg-white p-4 rounded-3xl shadow-sm border border-gray-50 hover:shadow-md transition-all">
                        <div class="flex justify-between items-center mb-3">
                            <span class="font-bold text-gray-800">${date}</span>
                            <span class="text-xs text-gray-400">${photos.length}개의 기록</span>
                        </div>
                        ${photoMarkup}
                    </div>
                `;
                timelineList.appendChild(section);
            });
        }

        // 4. 상세 화면 (1열 리스트 + 다운로드 버튼 추가)
        function renderDetail(date) {
            timelineList.innerHTML = '';
            document.getElementById('timeline-line').classList.add('hidden');
            backBtn.classList.remove('hidden');
            headerTitle.innerText = date;

            const photos = photoData[date];
            const detailContainer = document.createElement('div');
            detailContainer.className = "space-y-6 animate-fade-in";

            // renderDetail 함수 내 카드 생성 부분 수정
            photos.forEach((photo, idx) => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100 pb-2 mb-6";

                const isVideo = photo.src.toLowerCase().endsWith('.mp4') || photo.src.toLowerCase().endsWith('.mov');
                const fileName = photo.src.split('/').pop();

                // 동영상인 경우 <video>, 사진인 경우 <img> 태그 생성
                const mediaHtml = isVideo
                    ? `<video src="${photo.src}" controls class="w-full h-auto border-b border-gray-50" poster=""></video>`
                    : `<img src="${photo.src}" class="w-full h-auto object-cover border-b border-gray-50 active:opacity-70 transition-opacity" onclick="downloadImage('${photo.src}', '${fileName}')">`;

                card.innerHTML = `
                    <div class="relative group">
                        ${mediaHtml}
                    </div>
                    <div class="p-5 flex justify-between items-center">
                        <div>
                            <p class="text-xs font-bold text-pink-500 mb-1">${isVideo ? '🎥 Video' : '📸 Moment'} ${idx + 1}</p>
                            <p class="text-sm text-gray-700">하진이의 소중한 기록</p>
                        </div>
                        <span class="text-xs text-gray-400 font-medium">${photo.time}</span>
                    </div>
                `;
                detailContainer.appendChild(card);
            });

            timelineList.appendChild(detailContainer);
            window.scrollTo(0, 0);
        }

        async function downloadImage(imageSrc, fileName) {
            // 1. 모바일(아이폰/안드로이드) 공유 기능 지원 여부 확인
            if (navigator.share && navigator.canShare) {
                try {
                    const response = await fetch(imageSrc);
                    const blob = await response.blob();
                    const file = new File([blob], fileName, { type: blob.type });

                    // 공유 가능한 파일인지 한 번 더 체크
                    if (navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            files: [file],
                            title: '하진이 사진 저장',
                            text: '소중한 순간을 간직하세요.'
                        });
                        return; // 공유 성공 시 함수 종료 (이동 방지)
                    }
                } catch (error) {
                    // 사용자가 '취소'를 누르면 AbortError가 발생함 -> 이때는 아무것도 안 함
                    if (error.name === 'AbortError') {
                        console.log('사용자가 공유를 취소했습니다.');
                        return; // 여기서 리턴하여 이미지 URL 이동을 원천 차단
                    }
                    console.error("공유 중 오류 발생:", error);
                    // 공유 기능이 실패한 경우에만 일반 다운로드로 넘어감
                }
            }

            // 2. PC 환경이거나 공유 기능을 쓸 수 없는 경우 (일반 다운로드 실행)
            performDownload(imageSrc, fileName);
        }

        function performDownload(imageSrc, fileName) {
            const a = document.createElement('a');
            a.href = imageSrc;
            a.download = fileName;
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                window.URL.revokeObjectURL(a.href);
            }, 100);
        }

        backBtn.onclick = renderTimeline;

        // 시작 시 데이터 로드
        loadPhotosFromServer();
    </script>
</body>
</html>
