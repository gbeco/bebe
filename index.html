<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>우리 아기 성장일기</title>
</head>
<body class="bg-gray-50 font-sans">

    <header class="bg-white p-6 shadow-sm sticky top-0 z-10">
        <div class="flex items-center space-x-4">
            <div class="w-16 h-16 bg-pink-100 rounded-full flex items-center justify-center overflow-hidden border-2 border-pink-200">
                <span class="text-2xl">👶</span>
            </div>
            <div>
                <h1 class="text-xl font-bold text-gray-800">지후의 성장기록</h1>
                <p class="text-sm text-pink-500 font-semibold">태어난 지 +128일</p>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-8 relative">
        <div class="absolute left-8 top-0 bottom-0 w-0.5 bg-gray-200 z-0"></div>

        <section class="relative z-10 flex space-x-4">
            <div class="w-8 h-8 bg-pink-400 rounded-full border-4 border-white shadow-sm mt-1 flex-shrink-0"></div>
            <div class="flex-1 bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
                <div class="p-3 bg-gray-50 flex justify-between items-center">
                    <span class="font-bold text-gray-700">2024년 5월 20일</span>
                    <span class="text-xs text-gray-400">오후 2:30</span>
                </div>
                <div class="aspect-square bg-gray-200 flex items-center justify-center text-gray-400">
                    사진 업로드 영역 (이미지 태그 들어갈 곳)
                </div>
                <div class="p-4">
                    <p class="text-gray-600 leading-relaxed">오늘은 처음으로 뒤집기에 성공했어요! 너무 대견한 우리 아기 😍</p>
                </div>
            </div>
        </section>

        <section class="relative z-10 flex space-x-4">
            <div class="w-8 h-8 bg-gray-300 rounded-full border-4 border-white shadow-sm mt-1 flex-shrink-0"></div>
            <div class="flex-1 bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
                <div class="p-3 bg-gray-50 flex justify-between items-center">
                    <span class="font-bold text-gray-700">2024년 5월 19일</span>
                </div>
                <div class="aspect-square bg-gray-200"></div>
                <div class="p-4">
                    <p class="text-gray-600 leading-relaxed">목욕하고 기분 좋은 상태. 뽀송뽀송해요.</p>
                </div>
            </div>
        </section>
    </main>

    <button class="fixed bottom-6 right-6 w-14 h-14 bg-pink-500 text-white rounded-full shadow-lg text-3xl flex items-center justify-center hover:bg-pink-600 transition-all">
        +
    </button>

</body>
</html>
