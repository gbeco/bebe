<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>하진이 성장 앨범</title>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .photo-grid { display: grid; gap: 8px; width: 100%; aspect-ratio: 16/9; }
        /* 아이폰에서 사진 길게 눌러 저장 가능하도록 설정 */
        .saveable-image { -webkit-touch-callout: default !important; display: block; }
        video { background: #000; }
        /* 로딩 오버레이 스타일 */
        #upload-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans mb-24">
    <div id="upload-overlay">
        <div class="text-6xl animate-bounce mb-4">🚀</div>
        <h2 class="text-xl font-bold text-gray-800">하진이 사진 업로드 중...</h2>
        <p class="text-sm text-gray-500 mt-2">잠시만 기다려주세요!</p>
    </div>

    <header class="bg-white/80 backdrop-blur-md p-6 shadow-sm sticky top-0 z-30 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <button id="back-btn" class="hidden text-2xl p-2 hover:bg-gray-100 rounded-full transition-all">←</button>
            <div>
                <h1 id="header-title" class="text-xl font-bold text-gray-800">하진이 성장 앨범</h1>
                <p id="d-day-display" class="text-xs text-pink-500 font-bold bg-pink-50 px-2 py-0.5 rounded-full inline-block mt-1">태어난 지 +0일</p>
            </div>
        </div>
        <div class="w-12 h-12 bg-pink-100 rounded-full flex items-center justify-center text-2xl border-2 border-white shadow-sm">👶</div>
    </header>

    <nav id="month-filter" class="bg-white border-b sticky top-[88px] z-20 overflow-x-auto whitespace-nowrap p-3 space-x-2 no-scrollbar">
        <button onclick="filterByMonth('all')" class="inline-block px-4 py-2 rounded-full text-sm font-bold bg-pink-500 text-white shadow-sm transition-all">전체</button>
    </nav>

    <style>
        /* 가로 스크롤바 숨기기 (깔끔한 디자인용) */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

    <main id="main-container" class="max-w-md mx-auto p-4 relative">
        <div id="timeline-line" class="absolute left-8 top-0 bottom-0 w-0.5 bg-gray-200 z-0"></div>
        <div id="timeline-list" class="space-y-10 relative z-10">
            <div class="text-center py-20 text-gray-400">사진 데이터를 불러오는 중...</div>
        </div>
    </main>

    <input type="file" id="file-input" accept="image/*, video/*" class="hidden" multiple>

    <button id="fab" class="fixed bottom-8 right-8 w-16 h-16 bg-pink-500 text-white rounded-full shadow-2xl text-4xl flex items-center justify-center active:scale-90 hover:bg-pink-600 transition-all z-40">
        +
    </button>

    <script>
        // --- 1. 설정 및 변수 ---
        const BIRTH_DATE = new Date("2026-01-16");
        const API_BASE = "https://wallpapers-locate-prepare-railway.trycloudflare.com";
        let photoData = {};

        const fileInput = document.getElementById('file-input');
        const fab = document.getElementById('fab');
        const timelineList = document.getElementById('timeline-list');
        const backBtn = document.getElementById('back-btn');
        const headerTitle = document.getElementById('header-title');

        // --- 2. 초기화 및 데이터 로드 ---
        function init() {
            updateDDay();
            loadPhotosFromServer();
        }

        function updateDDay() {
            const today = new Date();
            const diffTime = today.getTime() - BIRTH_DATE.getTime();
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;
            document.getElementById('d-day-display').innerText = `태어난 지 +${diffDays}일`;
        }

        async function loadPhotosFromServer() {
            try {
                const response = await fetch(`${API_BASE}/photos`, { cache: "no-store" });
                if (!response.ok) throw new Error("서버 응답 없음");

                const filenames = await response.json();
                photoData = {};

                filenames.sort().reverse().forEach(name => {
                    const dateStr = `${name.substring(0, 4)}-${name.substring(4, 6)}-${name.substring(6, 8)}`;
                    const timeStr = `${name.substring(9, 11)}:${name.substring(11, 13)}`;

                    if (!photoData[dateStr]) photoData[dateStr] = [];
                    photoData[dateStr].push({
                        src: `${API_BASE}/data/${name}`,
                        name: name,
                        time: timeStr
                    });
                });
                createMonthButtons();
                renderTimeline();
            } catch (err) {
                console.error(err);
                timelineList.innerHTML = `<div class="text-center py-20 text-gray-400 font-bold">서버 연결에 실패했습니다. 👶<br><span class="text-xs font-normal">Cloudflare 터널 상태를 확인해주세요.</span></div>`;
            }
        }

        // --- 3. 사진/영상 업로드 로직 ---
        fab.onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            // 1. 현재 서버에 등록된 모든 파일 이름을 가져와서 비교 세트 생성
            // photoData에 저장된 파일 이름들을 추출합니다.
            const existingFiles = new Set();
            Object.values(photoData).flat().forEach(photo => {
                // photo.name은 "20260331_123000_image.jpg" 형태입니다.
                existingFiles.add(photo.name);
            });

            const overlay = document.getElementById('upload-overlay');
            overlay.style.display = 'flex';
            fab.disabled = true;

            let uploadCount = 0;
            let skipCount = 0;

            for (const file of files) {
                // 2. 날짜 추출
                const photoDate = await getPhotoDate(file);

                // 3. 서버에 저장될 예상 파일명 생성 (app.py의 규칙과 동일하게)
                const expectedName = `${photoDate}_${file.name}`;

                // 4. 중복 체크: 이미 존재하는 파일명이면 업로드를 건너뜁니다.
                if (existingFiles.has(expectedName)) {
                    console.log(`중복 제외: ${file.name}`);
                    skipCount++;
                    continue;
                }

                const formData = new FormData();
                formData.append('photo', file);
                formData.append('taken_date', photoDate);

                try {
                    const response = await fetch(`${API_BASE}/upload`, {
                        method: 'POST',
                        body: formData
                    });
                    if (response.ok) uploadCount++;
                } catch (err) {
                    console.error("업로드 실패:", err);
                }
            }

            // 5. 결과 알림 및 마무리
            overlay.style.display = 'none';
            fab.disabled = false;
            fileInput.value = "";

            if (skipCount > 0) {
                alert(`${uploadCount}개 업로드 완료, ${skipCount}개 중복 제외되었습니다.`);
            }

            loadPhotosFromServer();
        };

        function getPhotoDate(file) {
            return new Promise((resolve) => {
                EXIF.getData(file, function() {
                    const dateStr = EXIF.getTag(this, "DateTimeOriginal");
                    if (dateStr) {
                        resolve(dateStr.replace(/:/g, "").replace(" ", "_"));
                    } else {
                        const lastMod = new Date(file.lastModified);
                        const year = lastMod.getFullYear();
                        const month = String(lastMod.getMonth() + 1).padStart(2, '0');
                        const day = String(lastMod.getDate()).padStart(2, '0');
                        const time = lastMod.toTimeString().split(' ')[0].replace(/:/g, "");
                        resolve(`${year}${month}${day}_${time}`);
                    }
                });
            });
        }

        // --- 4. 화면 렌더링 (타임라인 & 상세) ---
        function renderTimeline() {
            timelineList.innerHTML = '';
            document.getElementById('timeline-line').style.display = 'block';
            backBtn.classList.add('hidden');
            headerTitle.innerText = "하진이 성장 앨범";

            const sortedDates = Object.keys(photoData).sort().reverse();
            if (sortedDates.length === 0) {
                timelineList.innerHTML = `<div class="text-center py-20 text-gray-400">첫 기록을 남겨보세요.</div>`;
                return;
            }

            sortedDates.forEach(date => {
                const photos = photoData[date];
                const section = document.createElement('section');
                section.className = "flex space-x-4 cursor-pointer animate-fade-in";
                section.onclick = () => renderDetail(date);

                const getMediaTag = (photo, isSmall = false) => {
                    const isVideo = photo.src.toLowerCase().endsWith('.mp4') || photo.src.toLowerCase().endsWith('.mov');
                    if (isVideo) {
                        return `
                            <div class="relative w-full h-full bg-black">
                                <video src="${photo.src}"
                                       preload="metadata"
                                       playsinline
                                       muted
                                       class="w-full h-full object-cover"></video>
                                <div class="absolute inset-0 bg-black/20 flex items-center justify-center text-white ${isSmall ? 'text-xs' : 'text-xl'}">
                                    ▶️
                                </div>
                            </div>`;
                    } else {
                        return `<img src="${photo.src}" class="w-full h-full object-cover">`;
                    }
                };

                let photoMarkup = photos.length === 1
                    ? `<div class="w-full aspect-video rounded-2xl overflow-hidden border">${getMediaTag(photos[0])}</div>`
                    : `<div class="grid grid-cols-2 gap-2 w-full aspect-video">
                        <div class="rounded-2xl overflow-hidden border">${getMediaTag(photos[0])}</div>
                        <div class="grid grid-rows-2 gap-2">
                            <div class="rounded-xl overflow-hidden border">${getMediaTag(photos[1], true)}</div>
                            <div class="rounded-xl overflow-hidden relative border bg-gray-50">
                                ${photos[2] ? getMediaTag(photos[2], true) : ''}
                                ${photos.length > 2 ? `<div class="absolute inset-0 bg-black/40 flex items-center justify-center text-white text-xs font-bold">+${photos.length - 2}</div>` : ''}
                            </div>
                        </div>
                       </div>`;

                section.innerHTML = `
                    <div class="w-8 h-8 bg-pink-400 rounded-full border-4 border-white shadow-sm flex-shrink-0 mt-1"></div>
                    <div class="flex-1 bg-white p-4 rounded-3xl shadow-sm border border-gray-50 hover:shadow-md transition-all">
                        <div class="flex justify-between items-center mb-3">
                            <span class="font-bold text-gray-800">${date}</span>
                            <span class="text-xs text-gray-400">${photos.length}개의 기록</span>
                        </div>
                        ${photoMarkup}
                    </div>
                `;
                timelineList.appendChild(section);
            });
        }

        function renderDetail(date) {
            timelineList.innerHTML = '';
            document.getElementById('timeline-line').style.display = 'none';
            backBtn.classList.remove('hidden');
            headerTitle.innerText = date;

            const detailContainer = document.createElement('div');
            detailContainer.className = "space-y-6 animate-fade-in";

            photoData[date].forEach((photo, idx) => {
                const isVideo = photo.src.toLowerCase().endsWith('.mp4') || photo.src.toLowerCase().endsWith('.mov');
                const mediaHtml = isVideo
                    ? `<video src="${photo.src}" controls playsinline class="w-full h-auto rounded-t-3xl"></video>`
                    : `<img src="${photo.src}" class="w-full h-auto saveable-image" onclick="downloadImage('${photo.src}', '${photo.name}')">`;

                const card = document.createElement('div');
                card.className = "bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100 pb-2 mb-6";
                card.innerHTML = `
                    ${mediaHtml}
                    <div class="p-5 flex justify-between items-center">
                        <p class="text-xs font-bold text-pink-500">${isVideo ? '🎥 Video' : '📸 Moment'} ${idx + 1}</p>
                        <span class="text-xs text-gray-400">${photo.time}</span>
                    </div>
                `;
                detailContainer.appendChild(card);
            });
            timelineList.appendChild(detailContainer);
            window.scrollTo(0, 0);
        }

        // 전역 변수에 현재 선택된 월 저장
        let currentFilter = 'all';

        // 1. 서버에서 데이터를 받은 후 버튼 목록 만들기
        function createMonthButtons() {
            const filterContainer = document.getElementById('month-filter');
            // '전체' 버튼은 유지하고 나머지만 새로 고침
            filterContainer.innerHTML = `<button onclick="filterByMonth('all')" id="btn-all" class="filter-btn inline-block px-4 py-2 rounded-full text-sm font-bold bg-gray-100 text-gray-600 transition-all">전체</button>`;

            // 데이터에서 'YYYY-MM' 형식의 키만 추출해서 정렬
            const months = Object.keys(photoData)
                .map(date => date.substring(0, 7)) // "2026-03-31" -> "2026-03"
                .filter((v, i, a) => a.indexOf(v) === i) // 중복 제거
                .sort().reverse();

            months.forEach(month => {
                const [year, mm] = month.split('-');
                const btn = document.createElement('button');
                btn.id = `btn-${month}`;
                btn.className = "filter-btn inline-block px-4 py-2 rounded-full text-sm font-bold bg-gray-100 text-gray-600 transition-all";
                btn.innerText = `${parseInt(mm)}월`; // "03월" -> "3월"
                btn.onclick = () => filterByMonth(month);
                filterContainer.appendChild(btn);
            });

            updateFilterUI();
        }

        // 2. 버튼 클릭 시 필터링 실행
        function filterByMonth(month) {
            currentFilter = month;
            updateFilterUI();
            renderTimeline(); // 타임라인 다시 그리기
        }

        // 3. 선택된 버튼 강조 스타일 업데이트
        function updateFilterUI() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.replace('bg-pink-500', 'bg-gray-100');
                btn.classList.replace('text-white', 'text-gray-600');
            });

            const activeBtn = document.getElementById(`btn-${currentFilter}`);
            if (activeBtn) {
                activeBtn.classList.replace('bg-gray-100', 'bg-pink-500');
                activeBtn.classList.replace('text-gray-600', 'text-white');
            }
        }

        // 4. renderTimeline 함수 상단에 필터 로직 추가
        function renderTimeline() {
            timelineList.innerHTML = '';
            const line = document.getElementById('timeline-line');
            if(line) line.style.display = 'block';
            backBtn.classList.add('hidden');
            headerTitle.innerText = "하진이 성장 앨범";

            // 필터링 적용
            const sortedDates = Object.keys(photoData)
                .filter(date => currentFilter === 'all' || date.startsWith(currentFilter))
                .sort().reverse();

            if (sortedDates.length === 0) {
                timelineList.innerHTML = `<div class="text-center py-20 text-gray-400">해당 월의 기록이 없습니다.</div>`;
                return;
            }

            // ... (이하 기존 renderTimeline의 sortedDates.forEach 로직과 동일)
        }

        // --- 5. 다운로드 및 공유 기능 ---
        async function downloadImage(imageSrc, fileName) {
            if (navigator.share) {
                try {
                    const response = await fetch(imageSrc);
                    const blob = await response.blob();
                    const file = new File([blob], fileName, { type: blob.type });
                    await navigator.share({ files: [file], title: '하진이 사진 기록' });
                } catch (err) { performDownload(imageSrc, fileName); }
            } else { performDownload(imageSrc, fileName); }
        }

        function performDownload(imageSrc, fileName) {
            const a = document.createElement('a'); a.href = imageSrc; a.download = fileName; a.click();
        }

        backBtn.onclick = renderTimeline;

        // 시작!
        init();
    </script>
</body>
</html>
